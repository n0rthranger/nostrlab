<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#08080f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <meta name="description" content="Decentralized code collaboration built on Nostr. Host repositories, open issues, submit patches, and collaborate — no central server required." />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="NostrLab - Decentralized Code Collaboration" />
    <meta property="og:description" content="Host repositories, open issues, submit patches, and collaborate on code — all on the Nostr protocol. No central server, no gatekeepers." />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:site_name" content="NostrLab" />

    <!-- Twitter / Nostr clients -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="NostrLab - Decentralized Code Collaboration" />
    <meta name="twitter:description" content="Host repositories, open issues, submit patches, and collaborate on code — all on the Nostr protocol." />
    <meta name="twitter:image" content="/og-image.png" />

    <title>NostrLab - Decentralized Code Collaboration</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
